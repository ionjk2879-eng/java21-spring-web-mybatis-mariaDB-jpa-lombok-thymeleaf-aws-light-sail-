spring.application.name=exam-0625

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# MariaDB
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/exam_board?characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=0000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=com.example.exam0625.config.MariaDB104Dialect

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.example.exam0625.entity
mybatis.configuration.map-underscore-to-camel-case=true