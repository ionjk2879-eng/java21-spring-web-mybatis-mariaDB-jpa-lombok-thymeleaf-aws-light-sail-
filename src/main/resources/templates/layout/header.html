<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" th:fragment="header">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">게시판</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/board/list}">게시글 목록</a>
        </div>
        <div class="navbar-nav ms-auto">
            <th:block th:if="${session.loginMember == null}">
                <a class="nav-link" th:href="@{/member/login}">로그인</a>
                <a class="nav-link" th:href="@{/member/register}">회원가입</a>
            </th:block>
            <th:block th:if="${session.loginMember != null}">
                <span class="nav-link text-light" th:text="${session.loginMember.nickname} + '님'"></span>
                <a class="nav-link" th:href="@{/member/mypage}">마이페이지</a>
                <a class="nav-link" th:href="@{/member/logout}">로그아웃</a>
            </th:block>
        </div>
    </div>
</nav>
</body>
</html>
