<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title}">게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/header :: header}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-3" th:text="${board.title}"></h2>

            <div class="d-flex justify-content-between text-muted mb-3">
                <div>
                    <span th:text="${board.member.nickname}"></span> |
                    <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
                <span>조회 <span th:text="${board.viewCount}"></span></span>
            </div>

            <hr>

            <div class="mb-4" style="min-height: 300px; white-space: pre-wrap;" th:text="${board.content}"></div>

            <hr>

            <div class="d-flex justify-content-between">
                <a th:href="@{/board/list}" class="btn btn-secondary">목록</a>
                <div th:if="${session.loginMember != null and session.loginMember.id == board.member.id}">
                    <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn btn-warning me-2">수정</a>
                    <form th:action="@{/board/delete/{id}(id=${board.id})}" method="post" style="display: inline;"
                          onsubmit="return confirm('정말 삭제하시겠습니까?');">
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </form>
                </div>
            </div>

            <!-- 댓글 영역 -->
            <div class="mt-5">
                <h5>댓글 <span id="comment-count" th:text="${comments.size()}"></span>개</h5>
                <hr>

                <div id="comment-list">
                    <div th:each="comment : ${comments}"
                         th:id="'comment-' + ${comment.id}"
                         class="mb-3 p-3 bg-light rounded">
                        <div class="d-flex justify-content-between">
                            <div>
                                <strong th:text="${comment.member.nickname}"></strong>
                                <small class="text-muted ms-2"
                                       th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                            </div>
                            <div th:if="${session.loginMember != null and session.loginMember.id == comment.member.id}">
                                <button class="btn btn-sm btn-outline-warning me-1"
                                        th:onclick="'showEditForm(' + ${comment.id} + ')'">수정</button>
                                <button class="btn btn-sm btn-outline-danger"
                                        th:onclick="'deleteComment(' + ${comment.id} + ')'">삭제</button>
                            </div>
                        </div>
                        <p th:id="'comment-text-' + ${comment.id}"
                           class="mt-2 mb-0" style="white-space: pre-wrap;"
                           th:text="${comment.content}"></p>
                        <div th:id="'comment-edit-' + ${comment.id}" style="display:none;" class="mt-2">
                            <textarea th:id="'edit-input-' + ${comment.id}"
                                      class="form-control mb-2" rows="3"
                                      th:text="${comment.content}"></textarea>
                            <div class="text-end">
                                <button class="btn btn-sm btn-secondary me-1"
                                        th:onclick="'cancelEdit(' + ${comment.id} + ')'">취소</button>
                                <button class="btn btn-sm btn-primary"
                                        th:onclick="'saveEdit(' + ${comment.id} + ')'">수정 완료</button>
                            </div>
                        </div>
                    </div>

                    <div id="no-comments" th:if="${#lists.isEmpty(comments)}"
                         class="text-center text-muted py-3">
                        첫 번째 댓글을 작성해보세요.
                    </div>
                </div>

                <!-- 댓글 작성 -->
                <div th:if="${session.loginMember != null}" class="mt-4">
                    <textarea id="comment-input" class="form-control mb-2" rows="3"
                              placeholder="댓글을 입력하세요"></textarea>
                    <div class="text-end">
                        <button class="btn btn-primary btn-sm" onclick="addComment()">댓글 등록</button>
                    </div>
                </div>
                <div th:if="${session.loginMember == null}" class="text-center text-muted py-3">
                    <a th:href="@{/member/login}">로그인</a> 후 댓글을 작성할 수 있습니다.
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const boardId = [[${board.id}]];
    const loginMemberId = [[${session.loginMember != null ? session.loginMember.id : null}]];

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }

    function updateCommentCount(delta) {
        const el = document.getElementById('comment-count');
        el.textContent = parseInt(el.textContent) + delta;
    }

    function showEditForm(id) {
        document.getElementById('comment-text-' + id).style.display = 'none';
        document.getElementById('comment-edit-' + id).style.display = 'block';
    }

    function cancelEdit(id) {
        document.getElementById('comment-text-' + id).style.display = 'block';
        document.getElementById('comment-edit-' + id).style.display = 'none';
    }

    async function saveEdit(id) {
        const content = document.getElementById('edit-input-' + id).value.trim();
        if (!content) return;

        const res = await fetch(`/api/comment/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content})
        });

        if (res.ok) {
            document.getElementById('comment-text-' + id).textContent = content;
            document.getElementById('edit-input-' + id).value = content;
            cancelEdit(id);
        } else {
            alert(await res.text());
        }
    }

    async function deleteComment(id) {
        if (!confirm('댓글을 삭제하시겠습니까?')) return;

        const res = await fetch(`/api/comment/${id}`, {method: 'DELETE'});

        if (res.ok) {
            document.getElementById('comment-' + id).remove();
            updateCommentCount(-1);
        } else {
            alert(await res.text());
        }
    }

    async function addComment() {
        const textarea = document.getElementById('comment-input');
        const content = textarea.value.trim();
        if (!content) return;

        const res = await fetch('/api/comment', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({boardId, content})
        });

        if (res.ok) {
            const comment = await res.json();
            appendComment(comment);
            textarea.value = '';
            updateCommentCount(1);
        } else {
            alert(await res.text());
        }
    }

    function appendComment(comment) {
        const noComments = document.getElementById('no-comments');
        if (noComments) noComments.remove();

        const isOwner = loginMemberId !== null && loginMemberId === comment.memberId;

        const div = document.createElement('div');
        div.id = 'comment-' + comment.id;
        div.className = 'mb-3 p-3 bg-light rounded';
        div.innerHTML = `
            <div class="d-flex justify-content-between">
                <div>
                    <strong>${escapeHtml(comment.nickname)}</strong>
                    <small class="text-muted ms-2">${escapeHtml(comment.createdAt)}</small>
                </div>
                ${isOwner ? `
                <div>
                    <button class="btn btn-sm btn-outline-warning me-1" onclick="showEditForm(${comment.id})">수정</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteComment(${comment.id})">삭제</button>
                </div>` : ''}
            </div>
            <p id="comment-text-${comment.id}" class="mt-2 mb-0" style="white-space: pre-wrap;"></p>
            <div id="comment-edit-${comment.id}" style="display:none;" class="mt-2">
                <textarea id="edit-input-${comment.id}" class="form-control mb-2" rows="3"></textarea>
                <div class="text-end">
                    <button class="btn btn-sm btn-secondary me-1" onclick="cancelEdit(${comment.id})">취소</button>
                    <button class="btn btn-sm btn-primary" onclick="saveEdit(${comment.id})">수정 완료</button>
                </div>
            </div>
        `;

        div.querySelector('#comment-text-' + comment.id).textContent = comment.content;
        div.querySelector('#edit-input-' + comment.id).value = comment.content;

        document.getElementById('comment-list').appendChild(div);
    }
</script>
</body>
</html>
