<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/header :: header}"></nav>

<div class="container">
    <h2 class="mb-4">게시글 목록</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div class="d-flex justify-content-between mb-3">
        <span>총 <strong th:text="${totalCount}"></strong>건</span>
        <a th:href="@{/board/write}" class="btn btn-primary" th:if="${session.loginMember != null}">글쓰기</a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th style="width: 8%">번호</th>
            <th style="width: 45%">제목</th>
            <th style="width: 15%">작성자</th>
            <th style="width: 17%">작성일</th>
            <th style="width: 10%">조회</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board : ${boards}">
            <td th:text="${board.id}"></td>
            <td><a th:href="@{/board/detail/{id}(id=${board.id})}" th:text="${board.title}"></a></td>
            <td th:text="${board.member.nickname}"></td>
            <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${board.viewCount}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(boards)}">
            <td colspan="5" class="text-center">게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/board/list(page=${currentPage - 1}, size=${size}, searchType=${searchType}, keyword=${keyword})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/board/list(page=${i}, size=${size}, searchType=${searchType}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/board/list(page=${currentPage + 1}, size=${size}, searchType=${searchType}, keyword=${keyword})}">다음</a>
            </li>
        </ul>
    </nav>

    <!-- 검색 -->
    <form class="d-flex justify-content-center mt-3" th:action="@{/board/list}" method="get">
        <select name="searchType" class="form-select me-2" style="width: 150px;">
            <option value="title" th:selected="${searchType == 'title'}">제목</option>
            <option value="content" th:selected="${searchType == 'content'}">내용</option>
            <option value="writer" th:selected="${searchType == 'writer'}">작성자</option>
        </select>
        <input type="text" name="keyword" class="form-control me-2" style="width: 300px;"
               placeholder="검색어를 입력하세요" th:value="${keyword}">
        <button type="submit" class="btn btn-outline-primary">검색</button>
    </form>
</div>
</body>
</html>
