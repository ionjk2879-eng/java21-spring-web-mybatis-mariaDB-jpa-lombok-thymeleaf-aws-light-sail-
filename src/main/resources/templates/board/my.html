<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내가 작성한 게시글</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/header :: header}"></nav>

<div class="container">
    <h2 class="mb-4">내가 작성한 게시글</h2>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th style="width: 8%">번호</th>
            <th style="width: 50%">제목</th>
            <th style="width: 22%">작성일</th>
            <th style="width: 10%">조회</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board : ${boards}">
            <td th:text="${board.id}"></td>
            <td><a th:href="@{/board/detail/{id}(id=${board.id})}" th:text="${board.title}"></a></td>
            <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${board.viewCount}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(boards)}">
            <td colspan="4" class="text-center">작성한 게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/board/my(page=${currentPage - 1}, size=${size})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/board/my(page=${i}, size=${size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/board/my(page=${currentPage + 1}, size=${size})}">다음</a>
            </li>
        </ul>
    </nav>

    <a th:href="@{/board/list}" class="btn btn-secondary">목록으로</a>
</div>
</body>
</html>
